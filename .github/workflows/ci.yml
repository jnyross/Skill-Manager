name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go test ./...
      - run: go vet ./...
      - run: CGO_ENABLED=0 go build -trimpath -o "$RUNNER_TEMP/skillet" ./cmd/skillet
      - run: |
          "$RUNNER_TEMP/skillet" --version | grep '^skillet development '

  npm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22.14.0
            npm: 10.9.0
          - node: 24.11.1
            npm: 11.6.2
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packaging/npm/package.json
      - run: npm install --global npm@${{ matrix.npm }}
      - run: node --test packaging/npm/packages/skillet/test/*.test.cjs
      - run: node packaging/npm/scripts/validate-packages.mjs
